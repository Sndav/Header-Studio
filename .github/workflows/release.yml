name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to release, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Unsupported release tag: $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Check out tagged source
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Package extension
        env:
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        shell: bash
        run: |
          archive="header-studio-${RELEASE_TAG}.zip"
          crx="header-studio-${RELEASE_TAG}.crx"
          key_file="$RUNNER_TEMP/header-studio.pem"

          if [[ -z "$CRX_PRIVATE_KEY" ]]; then
            echo "Missing CRX_PRIVATE_KEY repository secret" >&2
            exit 1
          fi

          (cd dist && zip -r "../${archive}" .)
          printf '%s\n' "$CRX_PRIVATE_KEY" > "$key_file"
          chmod 600 "$key_file"
          google-chrome --headless --no-sandbox \
            --pack-extension="$GITHUB_WORKSPACE/dist" \
            --pack-extension-key="$key_file"
          mv "$GITHUB_WORKSPACE/dist.crx" "$crx"
          rm -f "$key_file"

          test -s "$archive"
          test -s "$crx"
          sha256sum "$archive" > "${archive}.sha256"
          sha256sum "$crx" > "${crx}.sha256"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          archive="header-studio-${RELEASE_TAG}.zip"
          crx="header-studio-${RELEASE_TAG}.crx"
          assets=("$archive" "${archive}.sha256" "$crx" "${crx}.sha256")
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --generate-notes \
              --title "Header Studio ${RELEASE_TAG}"
          fi
